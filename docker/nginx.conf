# NexusAgent Nginx Load Balancer Config
# Handles millions of requests

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml;

    # ============================================
    # UPSTREAM API SERVERS
    # ============================================
    upstream api_servers {
        least_conn;  # Load balancing strategy
        
        server api-1:3000 weight=5;
        server api-2:3000 weight=5;
        server api-3:3000 weight=5;
        
        # Add more servers for more capacity
        # server api-4:3000 weight=5;
        # server api-5:3000 weight=5;
        
        keepalive 32;  # Keep connections alive
    }

    # ============================================
    # RATE LIMITING ZONES
    # ============================================
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=1000r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;

    # Connection limits
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ============================================
    # SERVER CONFIG
    # ============================================
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Rate limiting
        limit_req zone=general burst=50 nodelay;

        # Health check endpoint
        location /health {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # API endpoints
        location /api/ {
            limit_req zone=api burst=100 nodelay;
            
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # Caching
            proxy_cache api_cache;
            proxy_cache_valid 200 1m;
            proxy_cache_use_stale error timeout updating;
        }

        # WebSocket upgrade
        location /ws {
            limit_req zone=api burst=50 nodelay;
            
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_read_timeout 86400;
        }

        # Authentication (stricter rate limit)
        location /auth/ {
            limit_req zone=auth burst=20 nodelay;
            
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Static files
        location /static/ {
            alias /var/www/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Default location
        location / {
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

# TCP load balancing for WebSocket
stream {
    upstream ws_servers {
        least_conn;
        
        server api-1:3001;
        server api-2:3001;
        server api-3:3001;
    }

    server {
        listen 8000;
        proxy_pass ws_servers;
        proxy_timeout 86400;
        proxy_buffer_size 4k;
    }
}
